openapi: 3.1.0
info:
  title: Minecraft MCP API
  description: REST API exposed by the Minecraft Fabric mod on port 7070. Wraps world manipulation, build task management, and prefab placement.
  version: 0.0.1

servers:
  - url: http://localhost:7070
    description: Local Minecraft server

tags:
  - name: system
    description: Health and connectivity
  - name: players
    description: Player queries and teleportation
  - name: entities
    description: Entity listing and spawning
  - name: blocks
    description: Block read/write, fill, and heightmap
  - name: messages
    description: Broadcast and targeted messages
  - name: prefabs
    description: Prefab structure placement (doors, stairs, windows, etc.)
  - name: structures
    description: NBT structure placement
  - name: effects
    description: World effects
  - name: builds
    description: Build task CRUD, execution, audit, preview, and rail planning

paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /api/test:
    get:
      tags: [system]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: Server is running

  # ── Players ─────────────────────────────────────────────────────────────────

  /api/world/players:
    get:
      tags: [players]
      summary: List online players
      operationId: getPlayers
      responses:
        "200":
          description: Array of online players with positions and rotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerInfo"

  /api/players/teleport:
    post:
      tags: [players]
      summary: Teleport a player
      operationId: teleportPlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeleportRequest"
      responses:
        "200":
          description: Teleport successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeleportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Player not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Entities ─────────────────────────────────────────────────────────────────

  /api/world/entities:
    get:
      tags: [entities]
      summary: List available entity types
      operationId: getEntities
      responses:
        "200":
          description: Array of entity types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityInfo"

  /api/world/entities/spawn:
    post:
      tags: [entities]
      summary: Spawn an entity
      operationId: spawnEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitySpawnRequest"
      responses:
        "200":
          description: Entity spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitySpawnResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Blocks ───────────────────────────────────────────────────────────────────

  /api/world/blocks/list:
    get:
      tags: [blocks]
      summary: List available block types
      operationId: listBlocks
      responses:
        "200":
          description: Array of block types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockInfo"

  /api/world/blocks/set:
    post:
      tags: [blocks]
      summary: Set a 3-D array of blocks
      operationId: setBlocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockSetRequest"
      responses:
        "200":
          description: Blocks placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockSetResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/blocks/chunk:
    post:
      tags: [blocks]
      summary: Read a 3-D chunk of blocks
      operationId: getBlocksChunk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkRequest"
      responses:
        "200":
          description: Block chunk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/blocks/fill:
    post:
      tags: [blocks]
      summary: Fill a rectangular region with a single block type
      operationId: fillBox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FillBoxRequest"
      responses:
        "200":
          description: Fill completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FillResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/blocks/heightmap:
    post:
      tags: [blocks]
      summary: Get heightmap for a region
      operationId: getHeightmap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeightmapRequest"
      responses:
        "200":
          description: Heightmap data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeightmapResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/blocks/heightmap/preview:
    post:
      tags: [blocks]
      summary: Render isometric heightmap preview as PNG
      operationId: previewHeightmap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeightmapPreviewRequest"
      responses:
        "200":
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "204":
          description: No blocks in region
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Messages ─────────────────────────────────────────────────────────────────

  /api/message/broadcast:
    post:
      tags: [messages]
      summary: Broadcast a message to all players
      operationId: broadcastMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/message/player:
    post:
      tags: [messages]
      summary: Send a message to a specific player
      operationId: sendMessageToPlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerMessageResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Prefabs ──────────────────────────────────────────────────────────────────

  /api/world/prefabs/door:
    post:
      tags: [prefabs]
      summary: Place one or more doors
      operationId: placeDoor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoorRequest"
      responses:
        "200":
          description: Doors placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoorResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/prefabs/stairs:
    post:
      tags: [prefabs]
      summary: Build a staircase
      operationId: placeStairs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StairsRequest"
      responses:
        "200":
          description: Staircase placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StairsResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/prefabs/window-pane:
    post:
      tags: [prefabs]
      summary: Place a wall of window panes
      operationId: placeWindowPane
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WindowPaneRequest"
      responses:
        "200":
          description: Window panes placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindowPaneResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/prefabs/torch:
    post:
      tags: [prefabs]
      summary: Place a torch
      operationId: placeTorch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TorchRequest"
      responses:
        "200":
          description: Torch placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TorchResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/prefabs/sign:
    post:
      tags: [prefabs]
      summary: Place a sign with text
      operationId: placeSign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
      responses:
        "200":
          description: Sign placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/world/prefabs/ladder:
    post:
      tags: [prefabs]
      summary: Place a vertical ladder
      operationId: placeLadder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LadderRequest"
      responses:
        "200":
          description: Ladder placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LadderResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Structures ───────────────────────────────────────────────────────────────

  /api/world/structure/place:
    post:
      tags: [structures]
      summary: Place an NBT structure (multipart upload)
      operationId: placeNbtStructure
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NbtStructurePlaceRequest"
      responses:
        "200":
          description: Structure placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NbtStructurePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Effects ──────────────────────────────────────────────────────────────────

  /api/world/effects/rain-fire:
    post:
      tags: [effects]
      summary: Rain fire over a circular area
      operationId: rainFire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RainFireRequest"
      responses:
        "200":
          description: Fire placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RainFireResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Builds ───────────────────────────────────────────────────────────────────

  /api/builds:
    post:
      tags: [builds]
      summary: Create a new build
      operationId: createBuild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuildRequest"
      responses:
        "201":
          description: Build created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/query-location:
    post:
      tags: [builds]
      summary: Find builds overlapping a bounding box
      operationId: queryBuildsByLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationQueryRequest"
      responses:
        "200":
          description: Matching builds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}:
    get:
      tags: [builds]
      summary: Get build with all tasks
      operationId: getBuild
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Build details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/tasks:
    get:
      tags: [builds]
      summary: List tasks for a build
      operationId: getBuildTasks
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      tags: [builds]
      summary: Add a task to a build
      operationId: addBuildTask
      parameters:
        - $ref: "#/components/parameters/BuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTaskRequest"
      responses:
        "201":
          description: Task added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      tags: [builds]
      summary: Reorder all tasks for a build
      operationId: reorderBuildTasks
      parameters:
        - $ref: "#/components/parameters/BuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTasksRequest"
      responses:
        "200":
          description: Tasks reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderTasksResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/tasks/{taskId}:
    delete:
      tags: [builds]
      summary: Delete a task from a build
      operationId: deleteBuildTask
      parameters:
        - $ref: "#/components/parameters/BuildId"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

    patch:
      tags: [builds]
      summary: Update a task's data or description
      operationId: updateBuildTask
      parameters:
        - $ref: "#/components/parameters/BuildId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/execute:
    post:
      tags: [builds]
      summary: Start executing a build asynchronously
      operationId: executeBuild
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncAcceptedResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/replay:
    post:
      tags: [builds]
      summary: Reset and re-execute all tasks for a build
      operationId: replayBuild
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "202":
          description: Replay started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncAcceptedResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/preview:
    get:
      tags: [builds]
      summary: Render isometric build preview as PNG
      operationId: previewBuild
      parameters:
        - $ref: "#/components/parameters/BuildId"
        - name: iso_scale
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 32
            default: 6
        - name: terrain_margin
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 8
            default: 0
        - name: view_direction
          in: query
          schema:
            $ref: "#/components/schemas/ViewDirection"
      responses:
        "200":
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "204":
          description: No blocks to render
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/audit:
    post:
      tags: [builds]
      summary: Audit a build for issues
      operationId: auditBuild
      parameters:
        - $ref: "#/components/parameters/BuildId"
      responses:
        "200":
          description: Audit results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/builds/{id}/plan-rail:
    post:
      tags: [builds]
      summary: Start async rail route planning
      operationId: planRail
      parameters:
        - $ref: "#/components/parameters/BuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRailPlanningRequest"
      responses:
        "202":
          description: Planning job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RailPlanningJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/rail-plans/{jobId}:
    get:
      tags: [builds]
      summary: Poll rail planning job status
      operationId: getRailPlanStatus
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Planning job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RailPlanningJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

# ── Components ───────────────────────────────────────────────────────────────

components:

  parameters:
    BuildId:
      name: id
      in: path
      required: true
      description: Build UUID
      schema:
        type: string
        format: uuid

    TaskId:
      name: taskId
      in: path
      required: true
      description: Task UUID
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Operation not allowed in current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # ── Shared primitives ──────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    World:
      type: string
      default: minecraft:overworld
      example: minecraft:overworld

    Position3D:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      required: [x, y, z]

    BlockData:
      type: object
      properties:
        block_name:
          type: string
          example: minecraft:stone
        block_states:
          type: object
          additionalProperties:
            type: string
          example:
            facing: north
      required: [block_name]

    BuildStatus:
      type: string
      enum: [CREATED, IN_PROGRESS, COMPLETED, FAILED]

    TaskStatus:
      type: string
      enum: [QUEUED, EXECUTING, COMPLETED, FAILED]

    TaskType:
      type: string
      enum:
        - BLOCK_SET
        - BLOCK_FILL
        - PREFAB_DOOR
        - PREFAB_STAIRS
        - PREFAB_WINDOW
        - PREFAB_TORCH
        - PREFAB_SIGN
        - PREFAB_LADDER
        - RAIL_SURFACE_SEGMENT
        - RAIL_BRIDGE_SEGMENT
        - RAIL_TUNNEL_SEGMENT

    HeightmapType:
      type: string
      enum: [WORLD_SURFACE, MOTION_BLOCKING, MOTION_BLOCKING_NO_LEAVES, OCEAN_FLOOR]
      default: WORLD_SURFACE

    BlockRotation:
      type: string
      enum: [NONE, CLOCKWISE_90, CLOCKWISE_180, COUNTERCLOCKWISE_90]
      default: NONE

    ViewDirection:
      type: string
      enum: [south, west, north, east]
      default: south

    Build:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        world:
          $ref: "#/components/schemas/World"
        status:
          $ref: "#/components/schemas/BuildStatus"
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [id, name, world, status, created_at]

    BuildTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        build_id:
          type: string
          format: uuid
        task_order:
          type: integer
        task_type:
          $ref: "#/components/schemas/TaskType"
        status:
          $ref: "#/components/schemas/TaskStatus"
        task_data:
          type: object
          description: Task-specific JSON payload
        description:
          type: string
        executed_at:
          type: string
          format: date-time
        error_message:
          type: string
      required: [id, build_id, task_order, task_type, status, task_data]

    # ── Players ───────────────────────────────────────────────────────────────

    PlayerInfo:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
          format: uuid
        position:
          $ref: "#/components/schemas/Position3D"
        rotation:
          type: object
          properties:
            yaw:
              type: number
            pitch:
              type: number
          required: [yaw, pitch]
      required: [name, uuid, position, rotation]

    TeleportRequest:
      type: object
      properties:
        player_name:
          type: string
        x:
          type: number
        y:
          type: number
        z:
          type: number
        dimension:
          $ref: "#/components/schemas/World"
        yaw:
          type: number
